<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gold Circle Background -->
  <circle cx="100" cy="100" r="95" fill="#C9A961" stroke="#B8960F" stroke-width="2"/>
  
  <!-- Scissors Icon -->
  <g transform="translate(100, 100)">
    <!-- Left blade -->
    <circle cx="-15" cy="-5" r="8" fill="white" stroke="white" stroke-width="1.5"/>
    <path d="M -15 3 Q -15 25 0 30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Right blade -->
    <circle cx="15" cy="-5" r="8" fill="white" stroke="white" stroke-width="1.5"/>
    <path d="M 15 3 Q 15 25 0 30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Center connection -->
    <line x1="-8" y1="15" x2="8" y2="15" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Text - VK UNISEX -->
  <text x="100" y="165" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a" letter-spacing="2">VK UNISEX</text>
  
  <!-- Text - SALON -->
  <text x="100" y="185" font-family="Georgia, serif" font-size="12" text-anchor="middle" fill="#1a1a1a" letter-spacing="3">SALON</text>
</svg>